<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket</title>
    <style>
        .field{
            /* border: 2px solid mediumturquoise; */

        }
        
        .bat{
            width: 400px;
            transform: rotate(30deg);
            transition: transform 0.1s ease-in;
        }
        .ball{
            width: 40px;
            height: 40px;
            background-color: black;
            border-radius: 50%;
            position: relative;
            left: 389px;
            bottom: 50px;
            transition: transform 1s ease-out 0.1s;

        }
        .field:hover .bat{
            transform: rotate(-30deg);
            transform-origin: top right;
            
        }
        .field:hover .ball{
            transform: translate(800px , -400px);

        }
    </style>
</head>
<body>
    <div class="field">
        <img src="image/bat.png" alt="" class="bat">
        <div class="ball"></div>
    </div>
</body>
</html>
